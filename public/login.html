<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca - Login</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',Tahoma,sans-serif; background:linear-gradient(135deg,#1b2a4a 0%,#2c3e50 50%,#34495e 100%); display:flex; justify-content:center; align-items:center; height:100vh; }
        .login { background:#fff; border-radius:8px; padding:35px 30px; width:340px; box-shadow:0 10px 40px rgba(0,0,0,.25); }
        .login h2 { margin:0 0 5px; font-size:20px; color:#1b2a4a; text-align:center; font-weight:700; }
        .login .sub { text-align:center; font-size:12px; color:#8a9bb5; margin-bottom:22px; }
        .login label { display:block; font-size:12px; color:#5a6a7e; margin-bottom:4px; font-weight:500; }
        .login input { width:100%; padding:8px 10px; margin-bottom:14px; border:1px solid #cdd5e0; border-radius:4px; font-size:13px; transition:border-color .15s ease,box-shadow .15s ease; background:#fafbfd; }
        .login input:focus { border-color:#5b9bd5; outline:none; box-shadow:0 0 0 3px rgba(91,155,213,.12); }
        .login button { width:100%; padding:9px; background:linear-gradient(180deg,#1b2a4a 0%,#141f38 100%); color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:14px; font-weight:500; transition:all .2s ease; }
        .login button:hover { background:linear-gradient(180deg,#233459 0%,#1b2a4a 100%); box-shadow:0 2px 8px rgba(27,42,74,.3); }
        .login .error { color:#c0392b; font-size:12px; margin-top:10px; display:none; text-align:center; background:#fef0ee; padding:7px; border-radius:4px; border:1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="login">
        <h2>Sistema de Biblioteca</h2>
        <p class="sub">Ingrese sus credenciales</p>
        <label>Correo</label>
        <input type="email" id="email" required>
        <label>Contrasena</label>
        <input type="password" id="password" required>
        <button id="btnLogin">Ingresar</button>
        <p class="error" id="error"></p>
    </div>
    <script src="js/login.js" defer></script>
</body>
</html>
