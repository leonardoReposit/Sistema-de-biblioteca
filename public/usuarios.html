<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca - Usuarios</title>
    <link rel="stylesheet" href="css/usuarios.css">
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <div class="sidebar-header">
                <h3>Biblioteca</h3>
                <p id="userInfo"></p>
            </div>
            <nav>
                <a href="/" class="nav-link">Dashboard</a>
                <a href="/usuarios.html" class="nav-link active">Usuarios</a>
                <a href="/categorias.html" class="nav-link">Categorias</a>
                <a href="/autores.html" class="nav-link">Autores</a>
                <a href="/editoriales.html" class="nav-link">Editoriales</a>
                <a href="/libros.html" class="nav-link">Libros</a>
                <a href="/prestamos.html" class="nav-link">Prestamos</a>
                <a href="/historial.html" class="nav-link">Historial</a>
            </nav>
            <div class="sidebar-footer">
                <button id="btnCerrarSesion">Cerrar Sesion</button>
            </div>
        </aside>
        <main id="main">
            <h2>Usuarios <span id="btnNuevo"></span></h2>
            <div class="filtros">
                <input type="text" id="buscar" placeholder="Buscar por nombre, DNI, correo o usuario...">
                <select id="filtroRol">
                    <option value="">Todos los roles</option>
                </select>
                <select id="filtroEstado">
                    <option value="">Todos los estados</option>
                    <option value="1">Activo</option>
                    <option value="0">Inactivo</option>
                </select>
            </div>
            <div id="tabla"></div>
        </main>
    </div>
    <script src="js/usuarios.js" defer></script>
</body>
</html>
